name: test

on:
  push:
  pull_request:

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
